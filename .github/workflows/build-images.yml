name: Build and publish container images

on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [python, typescript, php, csharp, foundation]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: environments/${{ matrix.environment }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hackathon-${{ matrix.environment }}:latest
            ghcr.io/${{ github.repository_owner }}/hackathon-${{ matrix.environment }}:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hackathon-${{ matrix.environment }}:latest
          cache-to: type=inline
